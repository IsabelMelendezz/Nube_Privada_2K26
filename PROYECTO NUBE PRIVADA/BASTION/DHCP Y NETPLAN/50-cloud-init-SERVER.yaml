network:
  version: 2
  ethernets:
    # INTERNET
    enp0s3:
      addresses: [192.168.1.13/24]
      routes:
        - to: default
          via: 192.168.1.1
      nameservers:
        addresses: [192.168.1.1, 8.8.8.8]

    # RED INTERNA
    enp0s8:
      addresses: [10.10.10.1/24]

    # DMZ
    enp0s9:
      addresses: [20.10.10.1/24]
